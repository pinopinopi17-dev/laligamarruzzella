    <style>
        :root {
            --azul: #1a2a6c;
            --gris-claro: #f4f7f6;
            --vs-bg: #333;
            --naranja: #f39c12;
            --border-local: #3498db;
            --border-visitante: #9b59b6;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--gris-claro); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 20px; }
        
        h1 { text-align: center; color: var(--azul); text-transform: uppercase; border-bottom: 2px solid #eee; padding-bottom: 20px; }

        .match-card-container { margin-bottom: 40px; border: 1px solid #eee; border-radius: 12px; overflow: hidden; background: #fff; }
        
        .match-row { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 25px; background: #fff; border-bottom: 2px solid #f8f9fa;
        }
        
        .team-box { flex: 1; display: flex; align-items: center; font-weight: bold; font-size: 1.2rem; }
        .team-box.left { justify-content: flex-end; text-align: right; color: var(--border-local); }
        .team-box.right { justify-content: flex-start; text-align: left; color: var(--border-visitante); }
        
        .shield { width: 60px; height: 60px; margin: 0 20px; object-fit: contain; }
        
        .vs-badge { 
            background: var(--vs-bg); color: white; padding: 10px 25px; 
            border-radius: 8px; font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 4px 0 #000;
        }

        /* DISEÑO DE FICHA DIVIDIDA */
        .match-details-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Una columna para local, otra para visitante */
            gap: 2px;
            background: #eee; /* Color del separador central */
        }

        .team-stats-column { background: #fff; padding: 20px; text-align: right;} 
        .team-stats-column.visitor { background: #fafafa; text-align: left;}
        .stat-item { margin-bottom: 15px; }
        .stat-item label { display: block; font-size: 0.7rem; color: #aaa; text-transform: uppercase; font-weight: 800; margin-bottom: 2px; }
        .stat-item span { font-size: 0.9rem; color: #333; line-height: 1.4; display: block; }

        /* PREMIOS GLOBALES (MVP, 11 IDEAL, ETC) */
        .global-awards { 
            grid-column: span 2; 
            background: var(--azul); 
            color: white; 
            padding: 15px; 
            display: flex; 
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .award-box { text-align: center; padding: 5px 15px; }
        .award-box small { display: block; font-size: 0.65rem; text-transform: uppercase; opacity: 0.7; margin-bottom: 3px; }
        .award-box b { font-size: 1rem; color: var(--naranja); }

        .match-header-info { text-align: center; padding: 10px; background: #f8f9fa; font-size: 0.8rem; color: #666; font-weight: bold; }
    </style>
</head>
