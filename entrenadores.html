<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Entrenadores - Liga Marruzzella</title>
    <style>
        :root {
            --azul: #1a2a6c;
            --gris-bg: #f8f9fa;
            --blanco: #ffffff;
            --naranja: #ffffff;
            --verde: #27ae60;
            --rojo: #c0392b;
            --accent: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--gris-bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: auto; }

        h1 { text-align: center; color: var(--azul); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }

        /* BUSCADOR Y FILTROS */
        .search-section { 
            background: var(--blanco); 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        
        .filter-group { display: flex; align-items: center; gap: 10px; flex-grow: 1; }

        input[type="text"], select {
            padding: 12px; font-size: 0.9rem; border: 2px solid #eee; border-radius: 8px; outline: none;
        }
        
        input[type="text"] { flex-grow: 2; }
        
        .sort-controls {
            display: flex;
            gap: 10px;
            background: #f1f2f6;
            padding: 10px;
            border-radius: 8px;
            align-items: center;
        }

        /* GRID DE ENTRENADORES */
        .coach-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .coach-card {
            background: var(--blanco);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            position: relative;
        }

        .coach-card:hover { transform: translateY(-5px); }

        .coach-header {
            background: var(--azul);
            color: white;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .coach-photo {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            background: #eee;
        }

        .coach-info h2 { margin: 0; font-size: 1.4rem; }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 5px;
        }
        .activo { background: var(--verde); color: white; }
        .libre { background: #7f8c8d; color: white; }

        .coach-body { padding: 20px; }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .stats-table td {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9rem;
        }
        .stats-table td:last-child { text-align: right; font-weight: bold; color: var(--azul); }

        .team-history {
            font-size: 0.85rem;
            color: #666;
            background: #f1f2f6;
            padding: 10px;
            border-radius: 8px;
        }
        .team-history strong { color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Staff Técnico - Estadísticas Históricas</h1>

    <div class="search-section">
        <input type="text" id="coachSearch" placeholder="Buscar entrenador..." onkeyup="procesarEntrenadores()">
        
        <div class="filter-group">
            <select id="statusFilter" onchange="procesarEntrenadores()">
                <option value="todos">Todos los estados</option>
                <option value="activo">En Activo</option>
                <option value="libre">Libres / Destituidos</option>
            </select>
        </div>

        <div class="sort-controls">
            <span>Ordenar por:</span>
            <select id="sortCriterion" onchange="procesarEntrenadores()">
                <option value="pp">Puntos por Partido</option>
                <option value="v">Victorias</option>
                <option value="e">Empates</option>
                <option value="d">Derrotas</option>
                <option value="once">XI Ideal</option>
                <option value="titulos_count">Títulos</option>
            </select>
            <select id="sortOrder" onchange="procesarEntrenadores()">
                <option value="desc">Descendente</option>
                <option value="asc">Ascendente</option>
            </select>
        </div>
    </div>

    <div class="coach-grid" id="coachGrid"></div>
</div>

<script>
    const entrenadores = [
        { nombre: "Matías Almeyda", foto: "hispalis/almeyda.png", pj: 4, v: 1, e: 0, d: 3, once: 0, titulos: 0, pp:0.75, equipo: "-", ex: "C.A. Hispalis", estado: "libre" },
        { nombre: "Paco Jémez", foto: "xerez/jemez.png", pj: 7, v: 1, e: 2, d: 4, once: 0, titulos: 0, pp:0.71, equipo: "-", ex: "Xerez Eleven", estado: "libre" },
        { nombre: "Nagelsmann", foto: "cesped/nagelsmann.png", pj: 7, v: 1, e: 1, d: 5, once: 0, titulos: 0,pp:0.52, equipo: "Los Césped F.C.", ex: "-", estado: "activo" },
        { nombre: "La Cobra", foto: "flakitos/cobrix.png", pj: 7, v: 0, e: 2, d: 5, once: 1, titulos: 0, pp:0.29, equipo: "Flakitos F.C.", ex: "-", estado: "activo" },
        { nombre: "Mikel Arteta", foto: "humildes/arteta.png", pj: 7, v: 7, e: 0, d: 0, once: 0, titulos: 0, pp:3, equipo: "Humildes F.C.", ex: "-", estado: "activo" },
        { nombre: "Minguito", foto: "kinos/minguito.png", pj: 7, v: 3, e: 1, d: 3, once: 0, titulos: 0, pp:1.43, equipo: "U.D. Los Kinos", ex: "-", estado: "activo" },
        { nombre: "Enrique Pastor", foto: "maguila/enrique.png", pj: 7, v: 4, e: 2, d: 1, once: 0, titulos: 0, pp:2, equipo: "C.A. Maguila", ex: "-", estado: "activo" },
        { nombre: "Pablo Aimar", foto: "mascaras/aimar.webp", pj: 7, v: 5, e: 0, d: 2, once: 0, titulos: 0, pp:2.14, equipo: "Máscaras F.C.", ex: "-", estado: "activo" },
        { nombre: "Dries Mertens", foto: "pelusas/mertens.png", pj: 6, v: 2, e: 0, d: 4, once: 1, titulos: 0, pp:1, equipo: "Pelusas C.F.", ex: "-", estado: "activo" },
        { nombre: "Triple R", foto: "perrof/triplet.jpg", pj: 7, v: 0, e: 2, d: 5, once: 1, titulos: 0, pp:0.29, equipo: "Perro Flautas F.C.", ex: "-", estado: "activo" },
        { nombre: "Alonso", foto: "pololoco/alonso.png", pj: 7, v: 4, e: 3, d: 0, once: 0, titulos: 0, pp:2.14, equipo: "Pololoco F.C.", ex: "-", estado: "activo" },
        { nombre: "Segundo Castillo", foto: "sportium/segundo.png", pj: 6, v: 1, e: 2, d: 3, once: 0, pp:0.83, titulos: "3er Mejor Entrenador 2025", equipo: "-", ex: "Sportium de Gijón", estado: "libre" },
        { nombre: "Del Bosque", foto: "union/vicente.png", pj: 7, v: 5, e: 1, d: 1, once: 2, titulos: 0, pp:2.29, equipo: "Unión Española", ex: "-", estado: "activo" },
        { nombre: "Gravesen", foto: "violeteros/gravesen.png", pj: 7, v: 4, e: 0, d: 3, once: 0, titulos: 0, pp:1.71, equipo: "Violeteros F.C.", ex: "-", estado: "activo" },
        { nombre: "Simeone", foto: "hispalis/simeone.png", pj: 3, v: 2, e: 0, d: 1, once: 1, titulos: 0, pp:2, equipo: "C.A. Hispalis", ex: "-", estado: "activo" },
        { nombre: "Rafa Nadal", foto: "xerez/rafa.png", pj: 0, v: 0, e: 0, d: 0, once: 0, titulos: 0, pp:0, equipo: "Xerez Eleven", ex: "-", estado: "activo" },
        { nombre: "Manuel Mesa", foto: "sportium/manolo.png", pj: 0, v: 0, e: 0, d: 0, once: 0, titulos: 0, pp:0, equipo: "Sportium de Gijón", ex: "-", estado: "activo" }
    ];

    function renderEntrenadores(lista) {
        const grid = document.getElementById('coachGrid');
        grid.innerHTML = lista.map(c => `
            <div class="coach-card">
                <div class="coach-header">
                    <img src="${c.foto}" class="coach-photo" alt="${c.nombre}">
                    <div class="coach-info">
                        <h2>${c.nombre}</h2>
                        <span class="status-badge ${c.estado}">${c.estado === 'activo' ? 'En Activo' : 'Destituido'}</span>
                    </div>
                </div>
                <div class="coach-body">
                    <table class="stats-table">
                        <tr><td>Partidos Dirigidos</td><td>${c.pj}</td></tr>
                        <tr><td>Victorias / Empates / Derrotas</td><td>${c.v} / ${c.e} / ${c.d}</td></tr>
                        <tr><td>Puntos por Partido</td><td>${c.pp.toFixed(2)}</td></tr>
                        <tr><td>XI de la Semana</td><td>${c.once} veces</td></tr>
                        <tr><td>Títulos / Distinciones</td><td>${c.titulos === 0 ? '0' : c.titulos}🏆</td></tr>
                        <tr><td>Equipo Actual</td><td>${c.equipo}</td></tr>
                    </table>
                    <div class="team-history">
                        <strong>Trayectoria:</strong> ${c.ex}
                    </div>
                </div>
            </div>
        `).join('');
    }

    function procesarEntrenadores() {
        const busqueda = document.getElementById('coachSearch').value.toLowerCase();
        const filtroEstado = document.getElementById('statusFilter').value;
        const criterio = document.getElementById('sortCriterion').value;
        const orden = document.getElementById('sortOrder').value;

        // 1. Filtrar
        let resultado = entrenadores.filter(c => {
            const coincideNombre = c.nombre.toLowerCase().includes(busqueda);
            const coincideEstado = filtroEstado === 'todos' || c.estado === filtroEstado;
            return coincideNombre && coincideEstado;
        });

        // 2. Ordenar
        resultado.sort((a, b) => {
            let valA, valB;

            // Tratamiento especial para títulos (si es String "3er mejor..." vs Número 0)
            if (criterio === 'titulos_count') {
                valA = (typeof a.titulos === 'string') ? 1 : a.titulos;
                valB = (typeof b.titulos === 'string') ? 1 : b.titulos;
            } else {
                valA = a[criterio];
                valB = b[criterio];
            }

            if (orden === 'asc') return valA - valB;
            return valB - valA;
        });

        renderEntrenadores(resultado);
    }

    // Ejecución inicial (Ordenado por defecto por PP Descendente)
    window.onload = procesarEntrenadores;
</script>

</body>
</html>
