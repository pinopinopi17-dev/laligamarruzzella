<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --accent: #00d2ff;
            --gold: #fdbb2d;
            --semi: #9d50bb;
            --white: #ffffff;
        }

        body {
            background: radial-gradient(circle at center, #1b2735 0%, #0b1826 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: auto;
            padding: 20px;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 5px;
            text-shadow: 0 0 15px var(--accent);
            margin-bottom: 40px;
            text-align: center;
        }

        .tournament-grid {
            display: grid;
            grid-template-columns: 190px 170px 170px 220px 170px 170px 190px;
            gap: 10px;
            align-items: center;
            width: fit-content;
        }

        .column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 620px;
        }

        .label {
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--accent);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .matchup {
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            padding: 8px 10px;
            border-radius: 10px;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            box-sizing: border-box; /* Crucial para que no se salga el contenido */
        }

        .team-row {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Empuja el score a la derecha */
            height: 30px;
            width: 100%;
        }

        .team-info {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }

        .team-row img { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
        .team-row span { font-size: 0.72rem; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .score {
            background: #eee;
            color: #000;
            min-width: 22px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 900;
            margin-left: 5px;
            border: 1px solid #ddd;
        }

        .vs-sep { height: 1px; background: #ddd; margin: 4px 0; }

        .octavos { border-left: 4px solid var(--accent); }
        .octavos-r { border-right: 4px solid var(--accent); border-left: none; }
        
        .cuartos { border-bottom: 3px solid #5c0000; margin: 45px 0; }
        .semis { border-bottom: 3px solid var(--semi); margin: auto 0; }
        
        .final-box {
            border: 4px solid var(--gold);
            transform: scale(1.1);
            background: #fff;
            text-align: center;
            margin: 30px;
        }

        .trophy { font-size: 3.5rem; margin-bottom: 10px; display: block; }
        
        .placeholder-text {
            color: #888;
            font-size: 0.65rem;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

    <script>
    const equipos = [
        // ... (tu lista de equipos se mantiene igual)
        { nombre: "Perroflautas F.C.", escudo: "perrof/perrof.png", score: "-" },
        { nombre: "Los Césped F.C.", escudo: "cesped/descarga.png", score: "-" },

        { nombre: "Flakitos F.C.", escudo: "flakitos/flakitos.png", score: "1" },
        { nombre: "Patata F.C.", escudo: "copa/patata.png", score: "-" },
        { nombre: "Lacasitos F.C.", escudo: "copa/lacasito.png", score: "-" },
        { nombre: "Sportium de Gijón", escudo: "sportium/sportium.png", score: "-" },
        { nombre: "Pololoco F.C.", escudo: "pololoco/aaa.png", score: "-" },
        { nombre: "C.A. Maguila", escudo: "historico/maguila-Photoroom.png", score: "-" },
        { nombre: "Unión Española", escudo: "union/union.png", score: "-" },
        { nombre: "U.D. Los Kinos", escudo: "kinos/kinos.png", score: "0" },
        { nombre: "Humildes F.C.", escudo: "humildes/humildes.png", score: "3" }, // Resultado Octavos
        { nombre: "Xerez Eleven", escudo: "xerez/xerez.png", score: "-" },
        { nombre: "Pelusas C.F.", escudo: "pelusas/pelusas.png", score: "-" }
    ];

    // Función normal para Octavos (usa el score del array)
    function crearFilaHTML(equipo) {
        if (!equipo) return `<div class="team-row"><span class="placeholder-text">POR DEFINIR</span></div>`;
        return `
            <div class="team-row">
                <div class="team-info">
                    <img src="${equipo.escudo}" onerror="this.src='https://via.placeholder.com/25'">
                    <span>${equipo.nombre}</span>
                </div>
                <div class="score">${equipo.score || '0'}</div>
            </div>`;
    }

    // NUEVA FUNCIÓN: Para Cuartos (pone el marcador a 0 para el nuevo partido)
    function crearFilaCuartos(equipo, scorePersonalizado = "0") {
        if (!equipo) return `<div class="team-row"><span class="placeholder-text">POR DEFINIR</span></div>`;
        return `
            <div class="team-row">
                <div class="team-info">
                    <img src="${equipo.escudo}" onerror="this.src='https://via.placeholder.com/25'">
                    <span>${equipo.nombre}</span>
                </div>
                <div class="score">${scorePersonalizado}</div>
            </div>`;
    }

    function cargarArbol() {
        // 1. Cargar Octavos (mantiene sus resultados)
        for (let i = 0; i < 8; i++) {
            const contenedor = document.getElementById(`m${i}`);
            contenedor.innerHTML = crearFilaHTML(equipos[i*2]) + `<div class="vs-sep"></div>` + crearFilaHTML(equipos[i*2+1]);
        }

        // 2. Cargar Cuartos (Humildes arriba, Máscaras donde toca, marcador reseteado)
        
        // Bloque c1: Máscaras pasa con marcador 0
        document.getElementById('c1').innerHTML = 
            crearFilaCuartos(equipos[4], "-") + `<div class="vs-sep"></div>` + crearFilaCuartos(null);
        
        // Bloque c3: Humildes ARRIBA con marcador 0
        document.getElementById('c3').innerHTML = 
            crearFilaCuartos(equipos[13], "-") + `<div class="vs-sep"></div>` + crearFilaCuartos(null);

        // Rellenar el resto de Cuartos vacíos
        ['c0', 'c2'].forEach(id => {
            document.getElementById(id).innerHTML = crearFilaCuartos(null) + `<div class="vs-sep"></div>` + crearFilaCuartos(null);
        });
    }

    window.onload = cargarArbol;
</script>

function renderTablas() {
    const contenedor = document.getElementById('main-grid');
    let htmlFinal = "";

    configTablas.forEach(tabla => {
        const ranking = [...jugadores]
            // 1. Filtramos los que tienen 0 o no tienen datos
            .filter(j => {
                const valor = j[tabla.clave];
                return valor !== undefined && valor !== null && Number(valor) > 0;
            })
            // 2. Ordenamos: Primero por valor (descendente) y si hay empate por nombre (ascendente)
            .sort((a, b) => {
                const diff = b[tabla.clave] - a[tabla.clave];
                if (diff !== 0) {
                    return diff; // Si no hay empate, manda el valor numérico
                }
                // Si hay empate (diff === 0), ordenamos por nombre alfabéticamente
                return a.nombre.localeCompare(b.nombre);
            })
            .slice(0, 10);

        // Solo generamos la tabla si hay al menos un jugador con datos > 0
        if (ranking.length > 0) {
            htmlFinal += `
                <div class="table-container">
                    <h3>${tabla.etiqueta}</h3>
                    <table>
                        <thead><tr><th class="rank">#</th><th>Jugador</th><th class="val">Total</th></tr></thead>
                        <tbody>
                            ${ranking.map((p, i) => {
                                const fotoHtml = (i < 11) 
                                    ? `<img src="${p.foto || 'https://via.placeholder.com/150'}" class="img-top">` 
                                    : '';
                                
                                return `
                                    <tr>
                                        <td class="rank">${i+1}</td>
                                        <td>
                                            <div class="player-info">
                                                ${fotoHtml}
                                                <div>
                                                    ${p.nombre}<br>
                                                    <small style="color:#999">${p.equipo}</small>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="val">${p[tabla.clave]}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
    });
    contenedor.innerHTML = htmlFinal;
}
function searchPlayer() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const card = document.getElementById('player-card');

    // 1. Validación de entrada mínima
    if (input.length < 2) { 
        card.style.display = 'none'; 
        return; 
    }

    // 2. Búsqueda del jugador
    const p = jugadores.find(j => j.nombre.toLowerCase().includes(input));

    if (p) {
        // Mostrar la tarjeta
        card.style.display = 'block';

        // 3. Renderizar Cabecera (Foto, Nombre y Equipo)
        document.getElementById('p-nombre').innerHTML = `
            <img src="${p.foto}" style="width:100px; height:100px; border-radius:50%; vertical-align:middle; margin-right:10px;"> 
            ${p.nombre}`;
        
        document.getElementById('p-equipo').innerText = p.equipo;

        // 4. Renderizar Estadísticas (FILTRANDO LOS CEROS Y VACÍOS)
        document.getElementById('cardStats').innerHTML = configTablas
            .filter(t => {
                const valor = p[t.clave];
                // Filtro estricto: 
                // Convertimos a número para descartar el 0 y el "0"
                // Verificamos que no sea null, undefined o texto vacío
                return valor !== undefined && 
                    valor !== null && 
                    valor !== '' && 
                    Number(valor) !== 0;
            })
            .map(t => `
                <div class="stat-box">
                    <small>${t.etiqueta}</small>
                    <b>${p[t.clave]}</b>
                </div>
            `).join('');

    } else {
        // Si no hay coincidencia, ocultamos la tarjeta
        card.style.display = 'none';
    }
}
function searchByTeam() {
    const input = document.getElementById('teamInput').value.toLowerCase();
    const teamResults = document.getElementById('team-results');
    const playerCard = document.getElementById('player-card'); // Ficha individual
    const grid = document.getElementById('team-players-grid');
    const title = document.getElementById('team-title');

    if (input.length < 2) {
        teamResults.style.display = 'none';
        return;
    }

    // Filtrar jugadores por equipo
    const filtrados = jugadores.filter(j => j.equipo.toLowerCase().includes(input));

    if (filtrados.length > 0) {
        playerCard.style.display = 'none'; // Ocultamos la búsqueda individual
        teamResults.style.display = 'block';
        title.innerText = `Jugadores de: ${filtrados[0].equipo}`;
        
        grid.innerHTML = filtrados.map(p => {
            // Generar las estadísticas solo si el valor no es 0 o vacío
            const statsHtml = configTablas
                .filter(t => {
                    const valor = p[t.clave];
                    return valor !== undefined && valor !== null && valor !== '' && Number(valor) !== 0;
                })
                .map(t => `<div style="font-size:0.75rem"><b>${t.etiqueta}:</b> ${p[t.clave]}</div>`)
                .join('');

            return `
                <div class="team-player-mini-card">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 8px;">
                        <img src="${p.foto}" style="width:40px; height:40px; border-radius:50%;">
                        <h4 style="margin:0">${p.nombre}</h4>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                        ${statsHtml}
                    </div>
                </div>
            `;
        }).join('');
    } else {
        teamResults.style.display = 'none';
    }
}

    renderTablas();
