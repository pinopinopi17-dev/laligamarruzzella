<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra Táctica Marruzzella - Escudos Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --azul: #1a2a6c;
            --cesped: #2d5a27;
            --naranja: #d35400;
            --blanco: #ffffff;
        }

        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; margin: 0; padding: 20px; text-align: center; }

        /* PANEL DE CONTROL */
        .controls {
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px;
            display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center;
        }
        select, input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit; }
        button { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background: var(--azul); color: white; }
        .btn-export { background: var(--naranja); }

        #captureArea { width: fit-content; margin: auto; padding: 10px; background: #eef2f3; }

        .campo {
            width: 500px; height: 750px;
            background-color: var(--cesped);
            background-image: linear-gradient(rgba(255,255,255,0.05) 50%, transparent 50%);
            background-size: 100% 60px;
            border: 4px solid white; border-radius: 8px;
            position: relative; overflow: hidden; margin: auto;
        }

        /* Líneas reglamentarias completas */
        .campo::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.4); z-index: 1; }
        .area-grande-sup, .area-grande-inf { position: absolute; left: 50%; transform: translateX(-50%); width: 320px; height: 130px; border: 2px solid rgba(255,255,255,0.5); z-index: 1; }
        .area-grande-sup { top: -2px; border-top: 0; }
        .area-grande-inf { bottom: -2px; border-bottom: 0; }
        .punto-penalti, .punto-penalti-inf { position: absolute; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; background: white; border-radius: 50%; z-index: 1; }
        .punto-penalti { top: 90px; }
        .punto-penalti-inf { bottom: 95px; }
        .circulo-central { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 110px; height: 110px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; z-index: 1; }

        /* JUGADOR ARRASTRABLE */
        .posicion {
    position: absolute;
    width: 100px; /* Un poco más de margen para nombres largos */
    transform: translate(-50%, -50%); 
    display: flex;
    flex-direction: column;
    align-items: center; /* ESTO centra la foto y el nombre en el mismo eje */
    justify-content: center;
    z-index: 10;
    user-select: none;
    touch-action: none;
    cursor: grab;
}

/* 2. EL NOMBRE (Quitamos márgenes manuales que estorben) */
.nombre-jugador { 
    background: rgba(0,0,0,0.8); 
    color: white; 
    font-size: 0.7rem; 
    padding: 2px 8px; 
    border-radius: 6px; 
    margin-top: 5px; 
    white-space: nowrap; 
    max-width: 120px; /* Para que no se extienda infinito */
    text-align: center;
    display: block;
}

        .circulo-jugador {
            width: 60px; height: 60px; background: rgba(255,255,255,0.9);
            border-radius: 50%; border: 3px solid white;
            margin: 0 auto; position: relative; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }
        .circulo-jugador img.foto { width: 100%; height: 100%; object-fit: cover; }
        
        .escudo-mini {
            position: absolute; bottom: 22px; right: 5px; width: 24px; height: 24px;
            background: white; border-radius: 50%; border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 5; display: none;
        }


        #clubLogoSlot {
            position: absolute; bottom: 20px; left: 20px;
            width: 80px; height: 80px; z-index: 20; display: none;
        }

        .circulo-logo {
            width: 100%; height: 100%; background: var(--blanco);
            border-radius: 50%; border: 4px solid var(--azul);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        #mainTeamLogo { width: 85%; height: 85%; object-fit: contain; }

        /* ESQUINA DERECHA: ENTRENADOR (DT) */
        #coachSlot {
            position: absolute; bottom: 20px; right: 20px;
            width: 90px; text-align: center; cursor: pointer; z-index: 20;
        }
        .circulo-dt {
            width: 65px; height: 65px; background: var(--blanco);
            border-radius: 50%; border: 3px solid var(--naranja);
            margin: 0 auto; position: relative; overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
        .foto-dt { width: 100%; height: 100%; object-fit: cover; display: none; }
        .nombre-dt { background: var(--naranja); color: white; font-size: 0.75rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-top: 5px; white-space: nowrap; display: inline-block; }

        /* Modales */
        .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:100; }
        #searchModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 12px; z-index: 101; width: 300px; }
        .result-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; text-align: left; }
    </style>
</head>

        const slot = document.getElementById('clubLogoSlot');
        const img = document.getElementById('mainTeamLogo');
        if(teamName && escudos[teamName]) {
            img.src = escudos[teamName];
            slot.style.display = 'block';
        } else {
            slot.style.display = 'none';
        }
    }

    function updateFormation(type) {
        document.querySelectorAll('.posicion').forEach(p => p.remove());
        const presets = {
            '433': [[90,50,"POR"], [75,15,"LTI"], [78,38,"DFC"], [78,62,"DFC"], [75,85,"LTD"], [55,30,"MC"], [60,50,"MC"], [55,70,"MC"], [25,20,"EI"], [18,50,"DC"], [25,80,"ED"]],
            '442': [[90,50,"POR"], [75,15,"LTI"], [78,38,"DFC"], [78,62,"DFC"], [75,85,"LTD"], [52,15,"MI"], [55,40,"MC"], [55,60,"MC"], [52,85,"MD"], [22,35,"DC"], [22,65,"DC"]],
            '4231': [[90,50,"POR"], [75,15,"LTI"], [78,38,"DFC"], [78,62,"DFC"], [75,85,"LTD"], [62,35,"MCD"], [62,65,"MCD"], [40,15,"MI"], [35,50,"MCO"], [40,85,"MD"], [15,50,"DC"]],
            '343': [[90,50,"POR"], [78,25,"DFC"], [80,50,"DFC"], [78,75,"DFC"], [52,12,"MI"], [55,38,"MC"], [55,62,"MC"], [52,88,"MD"], [22,20,"EI"], [18,50,"DC"], [22,80,"ED"]],
            '352': [[90,50,"POR"], [78,25,"DFC"], [80,50,"DFC"], [78,75,"DFC"], [55,10,"MI"], [58,32,"MC"], [62,50,"MC"], [58,68,"MC"], [55,90,"MD"], [22,38,"DC"], [22,62,"DC"]],
            '4312': [[90,50,"POR"], [75,15,"LTI"], [78,38,"DFC"], [78,62,"DFC"], [75,85,"LTD"], [60,30,"MC"], [65,50,"MC"], [60,70,"MC"], [40,50,"MCO"], [20,38,"DC"], [20,62,"DC"]]
        };
        presets[type].forEach(p => createPlayer(p[0], p[1], p[2]));
    }

    function createPlayer(top, left, role) {
        const div = document.createElement('div');
        div.className = 'posicion';
        div.style.top = top + "%";
        div.style.left = left + "%";
        div.id = "s-" + Math.random().toString(36).substr(2, 5);
        div.innerHTML = `<img class="escudo-mini" src="" id="escudo-${div.id}"><div class="circulo-jugador"><span style="color:#ccc" id="plus-${div.id}">+</span><img class="foto" src="" id="foto-${div.id}" style="display:none"></div><div class="nombre-jugador">${role}</div>`;
        
        let isDragging = false;
        let startX, startY;
        const onDown = (e) => {
            const ev = e.type.includes('touch') ? e.touches[0] : e;
            startX = ev.clientX; startY = ev.clientY; isDragging = false;
            const onMove = (me) => {
                const mv = me.type.includes('touch') ? me.touches[0] : me;
                if (Math.abs(mv.clientX - startX) > 5 || Math.abs(mv.clientY - startY) > 5) {
                    isDragging = true;
                    const rect = document.getElementById('soccerField').getBoundingClientRect();
                    div.style.left = ((mv.clientX - rect.left) / rect.width * 100) + "%";
                    div.style.top = ((mv.clientY - rect.top) / rect.height * 100) + "%";
                }
            };
            const onUp = () => {
                document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
                document.removeEventListener('touchmove', onMove); document.removeEventListener('touchend', onUp);
                if (!isDragging) openSearch(div.id);
            };
            document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
            document.addEventListener('touchmove', onMove, {passive:false}); document.addEventListener('touchend', onUp);
        };
        div.addEventListener('mousedown', onDown); div.addEventListener('touchstart', onDown, {passive:false});
        document.getElementById('soccerField').appendChild(div);
    }

    function openSearch(id) {
        activeSlotId = id;
        document.getElementById('modalHeader').innerText = (id === 'coachSlot') ? "Elegir Entrenador" : "Elegir Jugador";
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('searchModal').style.display = 'block';
        filterPlayers(); 
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('searchModal').style.display = 'none';
    }

    // 2. FILTRADO POR LISTA SEGÚN SLOT
    function filterPlayers() {
        const val = document.getElementById('searchInput').value.toLowerCase();
        const list = document.getElementById('resultsList');
        list.innerHTML = '';
        
        // Decidimos qué lista usar
        const listaAUsar = (activeSlotId === 'coachSlot') ? entrenadores : jugadores;

        listaAUsar.filter(p => p.nombre.toLowerCase().includes(val)).forEach(p => {
            const item = document.createElement('div');
            item.className = 'result-item';
            item.innerHTML = (activeSlotId === 'coachSlot') ? `<b>${p.nombre}</b>` : `<b>${p.nombre}</b> <small>(${p.equipo})</small>`;
            
            item.onclick = () => {
                if(activeSlotId === 'coachSlot') {
                    const fotoDt = document.getElementById('foto-coachSlot');
                    fotoDt.src = p.foto;
                    fotoDt.style.display = 'block';
                    document.getElementById('plus-coachSlot').style.display = 'none';
                    document.querySelector('#coachSlot .nombre-dt').innerText = p.nombre;
                } else {
                    const fotoImg = document.getElementById(`foto-${activeSlotId}`);
                    const escudoImg = document.getElementById(`escudo-${activeSlotId}`);
                    fotoImg.src = p.foto;
                    fotoImg.style.display = 'block';
                    document.getElementById(`plus-${activeSlotId}`).style.display = 'none';
                    if(p.equipo && escudos[p.equipo]) {
                        escudoImg.src = escudos[p.equipo];
                        escudoImg.style.display = 'block';
                    }
                    document.getElementById(activeSlotId).querySelector('.nombre-jugador').innerText = p.nombre;
                }
                closeModal();
            };
            list.appendChild(item);
        });
    }

    function exportToImage() {
        html2canvas(document.getElementById('captureArea'), {useCORS: true}).then(canvas => {
            const link = document.createElement('a');
            link.download = 'pizarra_tactica.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    updateFormation('442');
</script>
</body>
